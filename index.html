<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarjama - AI Translator with Characters</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #3b82f6;
            --secondary: #8b5cf6;
            --success: #10b981;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--bg-color) 0%, #1a2d5c 100%);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(59, 130, 246, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            width: 90%;
            max-width: 900px;
            animation: slideUp 0.8s ease-out;
            position: relative;
            z-index: 1;
        }

        h1 {
            text-align: center;
            margin-bottom: 0.5rem;
            font-size: 2.5rem;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: glow 3s ease-in-out infinite;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.9rem;
            animation: fadeIn 1s ease-out 0.3s both;
        }

        .card {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            border: 1px solid rgba(59, 130, 246, 0.2);
            transition: all 0.3s;
            animation: slideUp 0.8s ease-out 0.2s both;
        }

        /* Avatar Section */
        .avatar-section {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 10px;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            cursor: pointer;
            transition: all 0.3s;
            border: 3px solid transparent;
            animation: popIn 0.5s ease-out;
        }

        .avatar:hover {
            transform: scale(1.15);
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
        }

        .avatar.active {
            border-color: var(--secondary);
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.8);
            transform: scale(1.2);
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 10px;
            margin-bottom: 1.5rem;
            align-items: center;
        }

        select {
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
            cursor: pointer;
        }

        select:hover, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
        }

        .swap-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--primary);
            border: none;
            color: white;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .swap-btn:hover {
            transform: scale(1.1) rotate(180deg);
            background: var(--secondary);
        }

        textarea {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 1rem;
            outline: none;
            resize: none;
            height: 100px;
            transition: all 0.3s;
            font-family: inherit;
            margin-bottom: 1rem;
        }

        textarea:hover, textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 1rem;
        }

        button {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
            background: #2563eb;
        }

        button:active {
            transform: scale(0.98);
        }

        button.secondary {
            background: var(--secondary);
        }

        button.secondary:hover {
            background: #7c3aed;
            box-shadow: 0 10px 25px rgba(139, 92, 246, 0.4);
        }

        button.success {
            background: var(--success);
        }

        button.success:hover {
            background: #059669;
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4);
        }

        .loader {
            display: none;
            text-align: center;
            color: var(--primary);
            font-weight: bold;
            margin-top: 10px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .loader span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primary);
            margin: 0 4px;
            animation: bounce 1.4s infinite;
        }

        .loader span:nth-child(1) { animation-delay: 0s; }
        .loader span:nth-child(2) { animation-delay: 0.2s; }
        .loader span:nth-child(3) { animation-delay: 0.4s; }

        /* Chat Bubble */
        .chat-bubble {
            display: none;
            position: relative;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(139, 92, 246, 0.2));
            border: 1px solid rgba(59, 130, 246, 0.3);
            padding: 1.5rem;
            border-radius: 20px;
            margin-top: 1.5rem;
            animation: bubbleIn 0.5s ease-out;
            min-height: 60px;
            display: flex;
            align-items: center;
            font-size: 1.1rem;
            line-height: 1.6;
            color: #cbd5e1;
        }

        .chat-bubble.show {
            display: flex;
        }

        .chat-bubble::before {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 20px;
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 0px solid transparent;
            border-top: 10px solid rgba(59, 130, 246, 0.3);
        }

        .output-controls {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            justify-content: flex-end;
        }

        .output-controls button {
            padding: 8px 12px;
            font-size: 0.9rem;
            flex: none;
            width: auto;
        }

        .status-message {
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            text-align: center;
            font-size: 0.9rem;
            animation: fadeIn 0.3s ease-out;
        }

        .status-message.success {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .status-message.error {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid #ef4444;
        }

        .info-banner {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            color: #cbd5e1;
            text-align: center;
        }

        .character-name {
            text-align: center;
            font-weight: bold;
            color: var(--secondary);
            margin-top: 1rem;
            font-size: 0.9rem;
        }

        .character-info {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-top: 0.3rem;
        }

        /* Animations */
        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes glow {
            0%, 100% {
                filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.5));
            }
            50% {
                filter: drop-shadow(0 0 20px rgba(139, 92, 246, 0.8));
            }
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.7;
            }
        }

        @keyframes popIn {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes bubbleIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8rem;
            }

            .avatar {
                width: 60px;
                height: 60px;
                font-size: 2rem;
            }

            .avatar-section {
                gap: 8px;
            }

            .controls {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }

            .card {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌍 Tarjama AI</h1>
        <p class="subtitle">Powered by AI • Interactive Translator with World Characters</p>
        
        <div class="card">
            <div class="info-banner">
                🌍 Select a character from around the world to translate with different personalities!
            </div>

            <!-- Avatar Selection -->
            <div class="avatar-section">
                <div class="avatar active" onclick="selectCharacter(0, '🤖 Iron Man', 'Tony Stark', 'en-US')" title="Iron Man - USA">
                    🤖
                </div>
                <div class="avatar" onclick="selectCharacter(1, '😺 Chat Parlant', 'Whiskers', 'fr-FR')" title="Chat - France">
                    😺
                </div>
                <div class="avatar" onclick="selectCharacter(2, '🎩 JARVIS', 'JARVIS', 'en-GB')" title="JARVIS - UK">
                    🎩
                </div>
                <div class="avatar" onclick="selectCharacter(3, '👨 Homme du Moyen-Orient', 'Ahmed', 'ar-SA')" title="Ahmed - Moyen-Orient">
                    👨
                </div>
                <div class="avatar" onclick="selectCharacter(4, '🎐 Yuki', 'Yuki', 'ja-JP')" title="Yuki - Japon">
                    🎐
                </div>
                <div class="avatar" onclick="selectCharacter(5, '🥁 Drummer Africain', 'Kofi', 'zu-ZA')" title="Kofi - Afrique">
                    🥁
                </div>
                <div class="avatar" onclick="selectCharacter(6, '💃 Danseuse Brésilienne', 'Maria', 'pt-BR')" title="Maria - Brésil">
                    💃
                </div>
                <div class="avatar" onclick="selectCharacter(7, '🎺 Musicien Cubain', 'Carlos', 'es-CU')" title="Carlos - Cuba">
                    🎺
                </div>
                <div class="avatar" onclick="selectCharacter(8, '🌮 Cowboy Mexicain', 'Diego', 'es-MX')" title="Diego - Mexique">
                    🌮
                </div>
                <div class="avatar" onclick="selectCharacter(9, '🥋 Samurai', 'Takeshi', 'ja-JP')" title="Takeshi - Japon">
                    🥋
                </div>
                <div class="avatar" onclick="selectCharacter(10, '🦘 Australien', 'Mate', 'en-AU')" title="Mate - Australie">
                    🦘
                </div>
            </div>

            <div class="character-name" id="characterName">🤖 Iron Man - Tony Stark</div>
            <div class="character-info" id="characterInfo">Confident and witty (English - USA)</div>

            <!-- Language Selection -->
            <div class="controls">
                <select id="langFrom"></select>
                <button class="swap-btn" onclick="swapLanguages()" title="Swap languages">⇄</button>
                <select id="langTo"></select>
            </div>

            <!-- Input Section -->
            <textarea id="inputText" placeholder="Type or speak... 🎤"></textarea>

            <!-- Buttons -->
            <div class="button-group">
                <button onclick="startListening()" title="Speak text">
                    🎤 Listen
                </button>
                <button onclick="translateText()" class="secondary" title="Translate">
                    🔄 Translate
                </button>
            </div>

            <!-- Loader -->
            <div class="loader" id="loader">
                <span></span><span></span><span></span>
                <p>Translating...</p>
            </div>

            <!-- Chat Bubble -->
            <div class="chat-bubble" id="chatBubble"></div>

            <!-- Output Controls -->
            <div class="output-controls" id="outputControls" style="display: none;">
                <button onclick="speakOutput()" class="success" title="Hear translation">
                    🔊 Hear
                </button>
                <button onclick="copyToClipboard()" class="secondary" title="Copy">
                    📋 Copy
                </button>
            </div>

            <!-- Status Message -->
            <div id="statusMessage"></div>
        </div>
    </div>

    <script>
        // Characters with personalities from around the world
        const characters = [
            { id: 0, name: '🤖 Iron Man', realName: 'Tony Stark', emoji: '🤖', accent: 'en-US', personality: 'Confident and witty', region: 'USA' },
            { id: 1, name: '😺 Chat Parlant', realName: 'Whiskers', emoji: '😺', accent: 'fr-FR', personality: 'Playful and charming', region: 'France' },
            { id: 2, name: '🎩 JARVIS', realName: 'JARVIS', emoji: '🎩', accent: 'en-GB', personality: 'Formal and polite', region: 'UK' },
            { id: 3, name: '👨 Homme du Moyen-Orient', realName: 'Ahmed', emoji: '👨', accent: 'ar-SA', personality: 'Warm and welcoming', region: 'Moyen-Orient' },
            { id: 4, name: '🎐 Geisha', realName: 'Yuki', emoji: '🎐', accent: 'ja-JP', personality: 'Elegant and calm', region: 'Japan' },
            { id: 5, name: '🥁 Drummer Africain', realName: 'Kofi', emoji: '🥁', accent: 'zu-ZA', personality: 'Energetic and rhythmic', region: 'Africa' },
            { id: 6, name: '💃 Danseuse Brésilienne', realName: 'Maria', emoji: '💃', accent: 'pt-BR', personality: 'Vibrant and passionate', region: 'Brazil' },
            { id: 7, name: '🎺 Musicien Cubain', realName: 'Carlos', emoji: '🎺', accent: 'es-CU', personality: 'Smooth and rhythmic', region: 'Cuba' },
            { id: 8, name: '🌮 Cowboy Mexicain', realName: 'Diego', emoji: '🌮', accent: 'es-MX', personality: 'Adventurous and bold', region: 'Mexico' },
            { id: 9, name: '🥋 Samurai', realName: 'Takeshi', emoji: '🥋', accent: 'ja-JP', personality: 'Strong and honorable', region: 'Japan' },
            { id: 10, name: '🦘 Australien', realName: 'Mate', emoji: '🦘', accent: 'en-AU', personality: 'Laid-back and friendly', region: 'Australia' }
        ];

        // Languages
        const languages = [
            { code: "en", name: "English" },
            { code: "fr", name: "French" },
            { code: "ar", name: "Arabic" },
            { code: "es", name: "Spanish" },
            { code: "de", name: "German" },
            { code: "it", name: "Italian" },
            { code: "pt", name: "Portuguese" },
            { code: "ru", name: "Russian" },
            { code: "zh", name: "Chinese" },
            { code: "ja", name: "Japanese" },
            { code: "ko", name: "Korean" },
            { code: "tr", name: "Turkish" },
            { code: "nl", name: "Dutch" },
            { code: "ro", name: "Romanian" }
        ];

        // Global Variables
        let currentCharacter = characters[0];
        let recognition;
        let lastTranslation = '';
        const langFrom = document.getElementById('langFrom');
        const langTo = document.getElementById('langTo');

        // Initialize
        languages.forEach(lang => {
            langFrom.add(new Option(lang.name, lang.code));
            langTo.add(new Option(lang.name, lang.code));
        });

        langFrom.value = "en";
        langTo.value = "fr";

        // Speech Recognition
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = true;

            recognition.onstart = function() {
                document.getElementById('inputText').placeholder = '🎤 Listening...';
            };

            recognition.onresult = function(event) {
                let transcript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                }
                document.getElementById('inputText').value = transcript;
            };

            recognition.onend = function() {
                document.getElementById('inputText').placeholder = 'Type or speak... 🎤';
            };

            recognition.onerror = function(event) {
                showStatus('Error: ' + event.error, 'error');
            };
        }

        // Select Character
        function selectCharacter(index, name, realName, accent) {
            currentCharacter = characters[index];
            document.querySelectorAll('.avatar').forEach((el, i) => {
                el.classList.toggle('active', i === index);
            });
            document.getElementById('characterName').innerText = `${currentCharacter.emoji} ${name}`;
            document.getElementById('characterInfo').innerText = `${currentCharacter.personality} (${currentCharacter.region})`;
        }

        // Start Listening
        function startListening() {
            if (!recognition) {
                showStatus('Speech recognition not supported', 'error');
                return;
            }
            recognition.lang = currentCharacter.accent;
            recognition.start();
        }

        // Translate Text
        async function translateText() {
            const text = document.getElementById('inputText').value;
            const chatBubble = document.getElementById('chatBubble');
            const loader = document.getElementById('loader');
            
            if (!text.trim()) {
                showStatus('⚠️ Please enter some text to translate', 'error');
                return;
            }

            chatBubble.classList.remove('show');
            loader.style.display = 'block';

            const from = langFrom.value;
            const to = langTo.value;

            if (from === to) {
                displayTranslation(text);
                showStatus('✨ Same language selected', 'success');
                return;
            }

            try {
                // Use LibreTranslate API (Free and reliable)
                const response = await fetch('https://libretranslate.de/translate', {
                    method: 'POST',
                    body: JSON.stringify({
                        q: text,
                        source: from,
                        target: to
                    }),
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();

                if (data.translatedText) {
                    displayTranslation(data.translatedText);
                    lastTranslation = data.translatedText;
                    showStatus('✅ Translation complete!', 'success');
                } else {
                    throw new Error('No translation text');
                }
            } catch (error) {
                console.error('LibreTranslate Error:', error);
                // Fallback to MyMemory API
                try {
                    const fallbackUrl = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${from}|${to}`;
                    const response = await fetch(fallbackUrl);
                    const data = await response.json();
                    
                    if (data.responseStatus === 200) {
                        displayTranslation(data.responseData.translatedText);
                        lastTranslation = data.responseData.translatedText;
                        showStatus('✅ Translation complete! (Fallback)', 'success');
                    } else {
                        showStatus('❌ Translation failed', 'error');
                    }
                } catch (e) {
                    showStatus('❌ Network Error', 'error');
                    console.error('Fallback Error:', e);
                }
            } finally {
                loader.style.display = 'none';
            }
        }

        // Display Translation in Chat Bubble
        function displayTranslation(text) {
            const chatBubble = document.getElementById('chatBubble');
            chatBubble.innerText = text;
            chatBubble.classList.add('show');
            document.getElementById('outputControls').style.display = 'flex';
        }

        // Text-to-Speech
        function speakOutput() {
            if (!lastTranslation) return;

            const utterance = new SpeechSynthesisUtterance(lastTranslation);
            const langMap = {
                'en': 'en-US', 'fr': 'fr-FR', 'ar': 'ar-SA', 'es': 'es-ES',
                'de': 'de-DE', 'it': 'it-IT', 'pt': 'pt-BR', 'ru': 'ru-RU',
                'zh': 'zh-CN', 'ja': 'ja-JP', 'ko': 'ko-KR', 'ro': 'ro-RO',
                'tr': 'tr-TR', 'nl': 'nl-NL'
            };

            utterance.lang = langMap[langTo.value] || 'en-US';
            utterance.rate = 0.9;
            utterance.pitch = 1;

            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
            showStatus('🔊 Playing audio...', 'success');
        }

        // Copy to Clipboard
        function copyToClipboard() {
            if (!lastTranslation) return;
            navigator.clipboard.writeText(lastTranslation).then(() => {
                showStatus('📋 Copied to clipboard!', 'success');
            }).catch(() => {
                showStatus('Failed to copy', 'error');
            });
        }

        // Swap Languages
        function swapLanguages() {
            const temp = langFrom.value;
            langFrom.value = langTo.value;
            langTo.value = temp;
        }

        // Show Status
        function showStatus(message, type) {
            const statusMsg = document.getElementById('statusMessage');
            statusMsg.innerHTML = `<div class="status-message ${type}">${message}</div>`;
            setTimeout(() => {
                statusMsg.innerHTML = '';
            }, 3000);
        }

        // Keyboard Shortcut
        document.getElementById('inputText').addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                translateText();
            }
        });
    </script>
</body>
</html>
